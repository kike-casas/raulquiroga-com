<section class="contact-page">
  <h1>Get in touch</h1>
  <p class="contact-sub">For work, collaborations or a conversation.</p>

  <form action="https://formsubmit.co/2152aa31ad9584a1c281faec10ad85e4" method="POST" class="contact-form" id="contactForm">
    <input type="hidden" name="_subject" value="raulquiroga.com enquiry">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://www.raulquiroga.com/contact.html?sent=1">
    <label>
      Name
      <input type="text" name="name" required autocomplete="name">
    </label>
    <label>
      Email
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>
      Message
      <textarea name="message" rows="6" required></textarea>
    </label>
    <button type="submit">Send</button>
    <p class="form-sent" id="formSent">Thank you. Your message is on its way.</p>
  </form>
</section>
